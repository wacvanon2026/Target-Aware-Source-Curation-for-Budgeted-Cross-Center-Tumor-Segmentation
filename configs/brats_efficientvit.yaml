dataset: brats
data:
  root: data/brats
  train_subjects: splits/brats/source_train.txt
  val_subjects: splits/brats/target_val.txt
  img_size: 224
model:
  name: efficientvit
  in_channels: 4
  num_classes: 4
trainer:
  max_iters: 500
training:
  batch_size: 16
  lr: 0.0001
  save_dir: outputs/brats/run
